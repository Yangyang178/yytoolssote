{% extends 'base.html' %}
{% block content %}
<div class="share-error-container">
    <div class="container">
        <div class="error-card">
            <div class="error-icon">❌</div>
            <h1 class="error-title">分享链接无效</h1>
            <p class="error-message">{{ error }}</p>
            <div class="error-actions">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="home-icon">🏠</i> 返回首页
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.share-error-container {
    padding: 120px 20px 60px;
    margin: 0;
    background: #f8fafc;
    min-height: calc(100vh - 120px);
}

.share-error-container .container {
    max-width: 600px;
    margin: 0 auto;
}

.error-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    padding: 60px 40px;
    margin-top: 60px;
    text-align: center;
}

.error-icon {
    font-size: 5rem;
    margin-bottom: 30px;
}

.error-title {
    font-size: 2rem;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 16px;
}

.error-message {
    font-size: 1.125rem;
    color: #64748b;
    margin-bottom: 40px;
    line-height: 1.6;
}

.error-actions {
    display: flex;
    justify-content: center;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    border: none;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
}

@media (max-width: 768px) {
    .share-error-container {
        padding: 100px 16px 40px;
    }
    
    .error-card {
        padding: 40px 24px;
    }
    
    .error-icon {
        font-size: 4rem;
    }
    
    .error-title {
        font-size: 1.5rem;
    }
}
</style>
{% endblock %}
