{% extends "base.html" %}

{% block title %}团队工作空间{% endblock %}

{% block content %}
<div class="workspace-container">
    <div class="workspace-header">
        <h1>团队工作空间</h1>
        <p class="workspace-subtitle">与团队成员协作管理文件</p>
        <button class="btn-primary" onclick="showCreateModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            创建空间
        </button>
    </div>

    <div class="workspace-tabs">
        <button class="tab-btn active" data-tab="my-spaces" onclick="switchTab('my-spaces')">我的空间</button>
        <button class="tab-btn" data-tab="joined-spaces" onclick="switchTab('joined-spaces')">已加入</button>
    </div>

    <div id="my-spaces" class="tab-content active">
        <div id="owned-workspaces" class="workspace-grid"></div>
    </div>

    <div id="joined-spaces" class="tab-content">
        <div id="joined-workspaces" class="workspace-grid"></div>
    </div>
</div>

<div id="create-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
        <div class="modal-header">
            <h2>创建工作空间</h2>
            <button class="modal-close" onclick="hideCreateModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>空间名称</label>
                <input type="text" id="ws-name" placeholder="输入空间名称" maxlength="50">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="ws-desc" placeholder="简要描述空间用途" rows="3" maxlength="200"></textarea>
            </div>
            <div class="form-group">
                <label>图标</label>
                <div class="icon-picker" id="icon-picker">
                    <span class="icon-option active" data-icon="📁">📁</span>
                    <span class="icon-option" data-icon="💼">💼</span>
                    <span class="icon-option" data-icon="🎨">🎨</span>
                    <span class="icon-option" data-icon="🔧">🔧</span>
                    <span class="icon-option" data-icon="📊">📊</span>
                    <span class="icon-option" data-icon="🚀">🚀</span>
                    <span class="icon-option" data-icon="💡">💡</span>
                    <span class="icon-option" data-icon="🎯">🎯</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="hideCreateModal()">取消</button>
            <button class="btn-primary" onclick="createWorkspace()">创建</button>
        </div>
    </div>
</div>

<div id="invite-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
        <div class="modal-header">
            <h2>邀请成员</h2>
            <button class="modal-close" onclick="hideInviteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>邮箱地址</label>
                <input type="email" id="invite-email" placeholder="输入成员邮箱">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="invite-role">
                    <option value="viewer">查看者</option>
                    <option value="editor">编辑者</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="hideInviteModal()">取消</button>
            <button class="btn-primary" onclick="inviteMember()">邀请</button>
        </div>
    </div>
</div>

<style>
.workspace-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.workspace-header { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.workspace-header h1 { font-size: 24px; font-weight: 700; margin: 0; }
.workspace-subtitle { color: var(--color-gray-500); margin: 0; flex: 1; }
.workspace-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid var(--color-gray-200); padding-bottom: 0; }
.tab-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--color-gray-500); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.workspace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.workspace-card { background: white; border: 1px solid var(--color-gray-200); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
.workspace-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.workspace-card-icon { font-size: 32px; margin-bottom: 12px; }
.workspace-card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.workspace-card-desc { font-size: 13px; color: var(--color-gray-500); margin-bottom: 12px; }
.workspace-card-meta { display: flex; gap: 16px; font-size: 12px; color: var(--color-gray-500); }
.workspace-card-role { position: absolute; top: 12px; right: 12px; padding: 2px 8px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; }
.role-owner { background: #fef3c7; color: #92400e; }
.role-admin { background: #dbeafe; color: #1e40af; }
.role-editor { background: #d1fae5; color: #065f46; }
.role-viewer { background: #f3f4f6; color: #4b5563; }
.btn-primary { background: var(--color-primary); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
.btn-primary:hover { background: var(--color-primary-dark); }
.btn-secondary { background: var(--color-gray-100); color: var(--color-gray-700); border: none; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; }
.btn-secondary:hover { background: var(--color-gray-200); }
.btn-danger { background: var(--color-danger); color: white; border: none; padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.modal-content { background: white; border-radius: var(--radius-lg); width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--color-gray-200); }
.modal-header h2 { margin: 0; font-size: 18px; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--color-gray-500); }
.modal-body { padding: 20px; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--color-gray-200); display: flex; justify-content: flex-end; gap: 8px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--color-gray-700); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--color-gray-300); border-radius: var(--radius-sm); font-size: 14px; box-sizing: border-box; }
.icon-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.icon-option { font-size: 24px; cursor: pointer; padding: 4px; border: 2px solid transparent; border-radius: var(--radius-sm); transition: border-color 0.2s; }
.icon-option.active, .icon-option:hover { border-color: var(--color-primary); }
.empty-state { text-align: center; padding: 48px 24px; color: var(--color-gray-500); }
.empty-state svg { margin-bottom: 16px; opacity: 0.5; }
</style>

<script>
let currentWorkspaceId = null;

document.querySelectorAll('.icon-option').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    });
});

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById(tabId).classList.add('active');
}

function showCreateModal() { document.getElementById('create-modal').style.display = 'flex'; }
function hideCreateModal() { document.getElementById('create-modal').style.display = 'none'; }
function showInviteModal(wsId) { currentWorkspaceId = wsId; document.getElementById('invite-modal').style.display = 'flex'; }
function hideInviteModal() { document.getElementById('invite-modal').style.display = 'none'; }

async function loadWorkspaces() {
    try {
        const resp = await fetch('/api/workspaces');
        const data = await resp.json();
        if (!data.success) return;
        const owned = document.getElementById('owned-workspaces');
        const joined = document.getElementById('joined-workspaces');
        const ownedList = data.data.owned || [];
        const joinedList = data.data.joined || [];
        owned.innerHTML = ownedList.length ? ownedList.map(renderCard).join('') : '<div class="empty-state"><p>暂无空间，点击上方按钮创建</p></div>';
        joined.innerHTML = joinedList.length ? joinedList.map(renderCard).join('') : '<div class="empty-state"><p>暂无加入的空间</p></div>';
    } catch(e) { console.error('加载工作空间失败:', e); }
}

function renderCard(ws) {
    const roleClass = `role-${ws.role || 'viewer'}`;
    const roleLabel = {owner:'拥有者',admin:'管理员',editor:'编辑者',viewer:'查看者'}[ws.role] || '查看者';
    return `<div class="workspace-card" onclick="window.location='/workspace/${ws.id}'">
        <span class="workspace-card-role ${roleClass}">${roleLabel}</span>
        <div class="workspace-card-icon">${ws.icon || '📁'}</div>
        <div class="workspace-card-name">${escapeHtml(ws.name)}</div>
        <div class="workspace-card-desc">${escapeHtml(ws.description || '')}</div>
        <div class="workspace-card-meta">
            <span>👥 ${ws.member_count || 1} 成员</span>
            <span>📄 ${ws.file_count || 0} 文件</span>
        </div>
    </div>`;
}

async function createWorkspace() {
    const name = document.getElementById('ws-name').value.trim();
    if (!name) { alert('请输入空间名称'); return; }
    const desc = document.getElementById('ws-desc').value.trim();
    const icon = document.querySelector('.icon-option.active')?.dataset.icon || '📁';
    try {
        const resp = await fetch('/api/workspaces', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, description: desc, icon})
        });
        const data = await resp.json();
        if (data.success) { hideCreateModal(); loadWorkspaces(); }
        else { alert(data.message || '创建失败'); }
    } catch(e) { alert('创建失败: ' + e.message); }
}

async function inviteMember() {
    const email = document.getElementById('invite-email').value.trim();
    const role = document.getElementById('invite-role').value;
    if (!email) { alert('请输入邮箱'); return; }
    try {
        const resp = await fetch(`/api/workspaces/${currentWorkspaceId}/members`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, role})
        });
        const data = await resp.json();
        if (data.success) { hideInviteModal(); alert('邀请成功'); }
        else { alert(data.message || '邀请失败'); }
    } catch(e) { alert('邀请失败: ' + e.message); }
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

loadWorkspaces();
</script>
{% endblock %}
